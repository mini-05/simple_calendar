# v4.4.2
# build_apk.yml
# .github/workflows/build_apk.yml
name: Build Flutter APK and AAB

on:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            /opt/hostedtoolcache/flutter
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-stable-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flutter-stable-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.27.4'

      - name: Get dependencies
        run: flutter pub get

      - name: Extract version from changed dart files
        id: version
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep "^lib/.*\.dart$" || true)
          echo "변경된 dart 파일: ${CHANGED:-없음}"

          EXTRACTED=""
          if [ -n "$CHANGED" ]; then
            EXTRACTED=$(echo "$CHANGED" \
              | xargs -I {} head -n 1 {} 2>/dev/null \
              | grep -E "^// v[0-9]+\.[0-9]+\.[0-9]+$" \
              | sed 's|// v||' \
              | sort -V | tail -n 1 | tr -d '[:space:]')
          fi

          if [ -n "$EXTRACTED" ]; then
            echo "dart 주석에서 추출된 버전: $EXTRACTED"
            APP_VERSION="$EXTRACTED"
          else
            APP_VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}' | cut -d '+' -f 1)
            echo "변경된 dart 없음 또는 버전 주석 없음 → pubspec 버전 유지: $APP_VERSION"
          fi

          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "value=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Decode Keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Keystore secret 없음 → debug 서명으로 빌드"
          fi

      - name: Create key.properties
        if: steps.keystore.outputs.exists == 'true'
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Build APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Build AppBundle
        run: flutter build appbundle --release

      - name: Rename APK and AAB
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/My_Calendar_v${APP_VERSION}.apk
          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/My_Calendar_v${APP_VERSION}.aab

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: My_Calendar_v${{ steps.version.outputs.value }}
          path: |
            build/app/outputs/flutter-apk/My_Calendar_v${{ steps.version.outputs.value }}.apk
            build/app/outputs/bundle/release/My_Calendar_v${{ steps.version.outputs.value }}.aab

      - name: Clean up keystore
        if: always()
        run: rm -f android/app/keystore.jks android/key.properties