# v4.1.0
# build_apk.yml
# .github/workflows/build_apk.yml
name: Build Flutter APK and AAB

on:
  push:
    branches: [ "main", "master" ]

# 💡 [중요] GitHub Actions 봇이 레포지토리에 커밋/푸시할 수 있도록 쓰기 권한 부여
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            /opt/hostedtoolcache/flutter
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flutter-
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 💡 1. 모든 Dart 파일의 1번 줄 주석을 스캔하여 최신 버전(예: 4.1.0) 추출
      - name: Extract max version from dart files
        id: extract_version
        run: |
          EXTRACTED_VERSION=$(find lib -name "*.dart" -exec head -n 1 {} \; | grep -E "^// v" | sed 's/\/\/ v//' | sort -V | tail -n 1 | tr -d '[:space:]')
          if [ -z "$EXTRACTED_VERSION" ]; then
            EXTRACTED_VERSION="1.0.0" # 못 찾으면 기본값
          fi
          echo "찾아낸 최고 버전: $EXTRACTED_VERSION"
          echo "APP_VERSION=$EXTRACTED_VERSION" >> $GITHUB_ENV

      # 💡 2. 추출한 버전으로 pubspec.yaml 자동 수정 (빌드 번호는 깃허브 실행 번호 활용)
      # 예: version: 4.1.0+15 (15번째 빌드인 경우)
      - name: Auto-update pubspec.yaml version
        run: |
          NEW_VERSION="${{ env.APP_VERSION }}+${{ github.run_number }}"
          echo "pubspec.yaml 버전을 $NEW_VERSION 으로 변경합니다."
          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml

      # 💡 3. 수정된 pubspec.yaml을 레포지토리에 자동 커밋 & 푸시
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          
          # 변경사항이 있을 때만 커밋
          if ! git diff-index --quiet HEAD; then
            git commit -m "🤖 빌드 봇: 버전 ${APP_VERSION} 자동 업데이트"
            git push
          else
            echo "변경사항이 없어 커밋하지 않습니다."
          fi
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release --target-platform android-arm64
        
      - name: Build AppBundle
        run: flutter build appbundle --release
        
      # 💡 4. 파일명도 주석에서 추출한 버전에 맞춰서 생성
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: simple_calendar_v${{ env.APP_VERSION }}_b${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab