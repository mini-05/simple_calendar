# v4.4.2
name: simple_calendar
description: My Calendar App — SoC 리팩터링 + Riverpod + 반복 일정
publish_to: none
version: 4.4.2+1

environment:
  sdk: ">=3.7.0 <4.0.0"  # [v4.4.2] Riverpod 3.x 요구사항 반영

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 상태 관리
  flutter_riverpod: ^3.2.1      # 2.5.1 → 3.2.1

  # 달력 UI
  table_calendar: ^3.1.2

  # 저장소
  flutter_secure_storage: ^9.2.4  # 9.0.0 → 9.2.4

  # 알림
  flutter_local_notifications: ^19.5.0  # 18.0.0 → 19.5.0
  timezone: ^0.10.1                     # 0.9.4 → 0.10.1
  flutter_timezone: ^5.0.1

  # 파일 / 공유
  file_picker: ^8.1.7           # 8.1.0 → 8.1.7
  path_provider: ^2.1.5         # 2.1.2 → 2.1.5
  share_plus: ^12.0.1           # 7.2.1 → 12.0.1

  # 권한
  permission_handler: ^12.0.1   # 11.3.0 → 12.0.1

  # 음력 변환
  lunar: ^1.7.6

  # 홈 위젯
  home_widget: ^0.7.0
  intl: ^0.20.2
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0          # 4.0.0 → 5.0.0
  flutter_launcher_icons: ^0.14.3 # 0.13.1 → 0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/calendar_image2.png"
  min_sdk_size: 21