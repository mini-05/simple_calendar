name: simple_calendar
description: A calendar app with themes, compatible with web and mobile.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:          # 한국어 로케일 지원
    sdk: flutter
  cupertino_icons: ^1.0.8
  table_calendar: ^3.1.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true